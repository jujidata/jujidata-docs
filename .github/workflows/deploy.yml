name: 🚀 自动构建并部署 Doks 文档

on:
  push:
    branches:
      - main  # 如果您的主分支名是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    # ✨ 关键修正：设置默认的工作目录
    defaults:
      run:
        working-directory: ./doks 

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🛠️ 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 📦 安装 Node.js 依赖
        # 有了上面的 defaults，这里会自动在 ./doks 下运行
        run: npm install

      - name: 🏗️ 执行构建
        run: npm run build

      - name: 🌐 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 注意：如果构建生成的 public 在 doks 目录下，这里要写成 ./doks/public
          publish_dir: ./doks/public